name: AI Documentation Updater

on:
  schedule:
    # Run on the 1st of every month at 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      doc_category:
        description: 'Documentation category to update'
        required: true
        type: choice
        options:
          - aiops
          - cloud-devops
          - ai-infra
          - ai-tools
          - ai-architecture
          - tool-setup
          - ai-learning
          - labs

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Generate documentation update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOC_CATEGORY: ${{ github.event.inputs.doc_category || 'aiops' }}
        run: |
          python << 'PYEOF'
          import anthropic
          import os
          import glob

          client = anthropic.Anthropic()
          category = os.environ.get("DOC_CATEGORY", "aiops")
          docs_dir = f"website/docs/{category}"

          # Read existing docs
          existing_docs = []
          for f in glob.glob(f"{docs_dir}/*.md"):
              with open(f) as fh:
                  existing_docs.append(f"File: {os.path.basename(f)}\n{fh.read()[:500]}")

          existing_summary = "\n---\n".join(existing_docs) if existing_docs else "Only getting-started.md exists."

          topics_map = {
              "aiops": ["Anomaly Detection with ML", "Event Correlation Patterns", "Automated Incident Response"],
              "cloud-devops": ["Terraform Best Practices", "CI/CD Pipeline Patterns", "AWS Well-Architected Review"],
              "ai-infra": ["GPU Cluster Management", "Model Serving at Scale", "ML Pipeline Architecture"],
              "ai-tools": ["Vector Database Tools", "LLM Evaluation Frameworks", "AI Code Generation Tools"],
              "ai-architecture": ["Multi-Agent System Architecture", "LLM Cost Optimization Patterns", "AI Platform Engineering"],
              "tool-setup": ["Docker Development Setup", "Kubernetes Local Development", "VS Code for DevOps"],
              "ai-learning": ["ML Fundamentals for DevOps", "Prompt Engineering Guide", "LLM Integration Patterns"],
              "labs": ["AIOps Pipeline Lab", "Kubernetes Security Lab", "Observability Stack Lab"],
          }

          topics = topics_map.get(category, ["Getting Started"])
          topic = topics[0]  # Pick first unwritten topic

          prompt = f"""Write a technical documentation page about: {topic}
          Category: {category}
          Existing docs: {existing_summary}

          Requirements:
          - Use Markdown format
          - Include frontmatter with title, sidebar_position, description, keywords
          - Set sidebar_position to {len(existing_docs) + 1}
          - For ai-tools category: Include tool overview, architecture explanation, use cases, comparison links, and deployment patterns
          - For ai-architecture category: Include architecture explanation, recommended tool stack, deployment patterns, and security considerations
          - For other categories: Include Overview, Prerequisites, Step-by-Step Guide, Best Practices, Troubleshooting
          - Include code examples where relevant
          - Include architecture diagrams using ASCII art where applicable
          - 800-1200 words
          - Tone: clear, practical, reference-quality
          - Link to related docs within the same category where appropriate
          - Include a Related section at the end linking to relevant architecture guides, tool docs, and comparisons

          Write the complete documentation page:"""

          response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=3000,
              messages=[{"role": "user", "content": prompt}],
          )

          content = response.content[0].text.strip()
          import re
          slug = re.sub(r'[^a-z0-9]+', '-', topic.lower()).strip('-')
          filepath = f"{docs_dir}/{slug}.md"

          with open(filepath, "w") as f:
              f.write(content + "\n")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"DOC_FILE={filepath}\n")
              f.write(f"DOC_TITLE={topic}\n")
              f.write(f"DOC_SLUG={slug}\n")

          print(f"Generated: {filepath}")
          PYEOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(${{ env.DOC_SLUG }}): ${{ env.DOC_TITLE }}"
          title: "📚 New Doc: ${{ env.DOC_TITLE }}"
          body: |
            ## AI-Generated Documentation

            **Title:** ${{ env.DOC_TITLE }}
            **File:** `${{ env.DOC_FILE }}`

            Documentation generated by the AI content pipeline.
            Please review for accuracy before merging.

            - [ ] Technical accuracy verified
            - [ ] Code examples tested
            - [ ] Links are correct
            - [ ] Fits within existing doc structure
          branch: docs/${{ env.DOC_SLUG }}
          labels: documentation, ai-generated
