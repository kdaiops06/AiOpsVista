name: Post-Deploy SEO Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  verify-seo-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run URL verification script
        run: |
          chmod +x ./scripts/verify-urls.sh
          ./scripts/verify-urls.sh
